name: Auto-close PRs

on:
  pull_request_target:
    types: [opened, edited, labeled]

permissions: {}

jobs:
  close_llm:
    runs-on: ubuntu-latest
    if: ${{ github.event.action == 'labeled' && github.event.label.name == 'auto-closed:llm' }}
    permissions:
      pull-requests: write
    steps:
      - name: Comment and close
        env:
          GH_TOKEN: ${{ github.GORELEASER }}
          NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          gh api graphql \
            -f prId="$NODE_ID" \
            -f body="Thank you for your interest in contributing to ImmichKiosk! Unfortunately this PR looks like it was generated using an LLM and as noted in our [CONTRIBUTING.md](https://github.com/damongolding/immich-kiosk/blob/main/CONTRIBUTING.MD#use-of-generative-ai), we request that you don't use LLMs to generate PRs." \
            -f query='
              mutation CommentAndClosePR($prId: ID!, $body: String!) {
                addComment(input: {
                  subjectId: $prId,
                  body: $body
                }) {
                  __typename
                }
                closePullRequest(input: {
                  pullRequestId: $prId
                }) {
                  __typename
                }
              }'
