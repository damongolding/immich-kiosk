version: "3"

silent: true

tasks:
  # Frontend tasks
  frontend:
    deps: [frontend-test, frontend-css, frontend-js, frontend-url-builder]
    dir: ./frontend
    desc: Run frontend linting
    cmds:
      - npm run lint

  frontend-install:
    dir: ./frontend
    desc: Install frontend dependencies
    cmds:
      - npm install

  frontend-build:
    dir: ./frontend
    desc: Build frontend assets
    cmds:
      - npm run build

  frontend-test:
    dir: ./frontend
    desc: Run frontend tests
    cmds:
      - npm run test

  frontend-css:
    dir: ./frontend
    desc: Compile and minify CSS assets
    cmds:
      - npm run css

  frontend-js:
    dir: ./frontend
    desc: Build JavaScript assets
    cmds:
      - npm run js

  frontend-url-builder:
    dir: ./frontend
    desc: Build URL builder assets
    cmds:
      - npm run url-builder

  frontend-outdated:
    dir: ./frontend
    desc: Check for outdated frontend dependencies
    cmds:
      - npm outdated || true

  frontend-update:
    dir: ./frontend
    desc: Update frontend dependencies
    cmds:
      - npm update
